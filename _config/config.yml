---
ag_beschreibung: # for PyQT
    "ag11": "Wissen \u00fcber die Zahlenmengen \u2115, \u2124, \u211a, \u211d, \u2102 verst\u00e4ndig einsetzen k\u00f6nnen"
    "ag12": "Wissen \u00fcber algebraische Begriffe angemessen einsetzen k\u00f6nnen:\nVariable, Terme, Formeln, (Un-)Gleichungen, Gleichungssysteme;\n\u00e4quivalenz, Umformungen, L\u00f6sbarkeit"
    "ag13": "Mit Aussagen und Mengen umgehen k\u00f6nnen"
    "ag14": "Zahlen in einem nichtdekadischen Zahlensystem darstellen k\u00f6nnen"
    "ag15": "Komplexe Zahlen in der Gau\u00df\u2019schen Zahlenebene\ndarstellen und mit komplexen Zahlen rechnen k\u00f6nnen."
    "ag21": "Einfache Terme und Formeln aufstellen, umformen und\nim Kontext deuten k\u00f6nnen"
    "ag22": "Lineare Gleichungen aufstellen, interpretieren, umformen/l\u00f6sen und\ndie L\u00f6sung im Kontext deuten k\u00f6nnen"
    "ag23": "Quadratische Gleichungen in einer Variablen umformen/l\u00f6sen,\n\u00fcber L\u00f6sungsf\u00e4lle Bescheid wissen, L\u00f6sungen und L\u00f6sungsf\u00e4lle\n(auch geometrisch) deuten k\u00f6nnen"
    "ag24": "Lineare Ungleichungen aufstellen, interpretieren, umformen/l\u00f6sen,\nL\u00f6sungen (auch geometrisch) deuten k\u00f6nnen"
    "ag25": "Lineare Gleichungssysteme in zwei Variablen aufstellen,\ninterpretieren, umformen/l\u00f6sen, \u00fcber L\u00f6sungsf\u00e4lle Bescheid wissen,\nL\u00f6sungen und L\u00f6sungsf\u00e4lle (auch geometrisch) deuten k\u00f6nnen"
    "ag26": "Den Satz von Vieta kennen und anwenden k\u00f6nnen"
    "ag27": "Lineare Gleichungssysteme in drei Variablen l\u00f6sen k\u00f6nnen"
    "ag28": "Den Fundamentalsatz der Algebra kennen und seine\nBedeutung bei der Zahlenbereichserweiterung\nvon \u211d auf \u2102 erl\u00e4utern k\u00f6nnen"
    "ag31": "Vektoren als Zahlentupel verst\u00e4ndig einsetzen\nund im Kontext deuten k\u00f6nnen"
    "ag32": "Vektoren geometrisch (als Punkte bzw. Pfeile)\ndeuten und verst\u00e4ndig einsetzen k\u00f6nnen"
    "ag33": "Definition der Rechenoperationen mit Vektoren\n(Addition, Multiplikation mit einem Skalar, Skalarmultiplikation)\nkennen, Rechenoperationen verst\u00e4ndig einsetzen und\n(auch geometrisch) deuten k\u00f6nnen"
    "ag34": "Geraden durch (Parameter-)Gleichungen in \u211d\u00B2 und \u211d\u00B3\nangeben k\u00f6nnen; Geradengleichungen interpretieren k\u00f6nnen;\nLagebeziehungen (zwischen Geraden und zwischen Punkt und Gerade)\nanalysieren, Schnittpunkte ermitteln k\u00f6nnen"
    "ag35": "Normalvektoren in \u211d\u00B2 aufstellen, verst\u00e4ndig einsetzen\nund interpretieren k\u00f6nnen"
    "ag36": "Die geometrische Bedeutung des Skalarprodukts kennen\nund den Winkel zwischen zwei Vektoren ermitteln k\u00f6nnen"
    "ag37": "Einheitsvektoren ermitteln, verst\u00e4ndig einsetzen\nund interpretieren k\u00f6nnen"
    "ag38": "Definition des vektoriellen Produkts und seine\ngeometrische Bedeutung kennen"
    "ag39": "Wissen, wodurch Ebenen festgelegt sind; Ebenen in\nParameter- und Normalvektordarstellung aufstellen k\u00f6nnen"
    "ag41": "Definitionen von Sinus, Cosinus, Tangens im rechtwinkligen\nDreieck kennen und zur Aufl\u00f6sung rechtwinkliger Dreiecke\neinsetzen k\u00f6nnen"
    "ag42": "Definitionen von Sinus, Cosinus f\u00fcr Winkel gr\u00f6\u00dfer als 90\u00b0\nkennen und einsetzen k\u00f6nnen"
    "ag43": "Einfache Berechnungen an allgemeinen Dreiecken,\nan Figuren und K\u00f6rpern (auch mittels Sinus- und Cosinussatz)\ndurchf\u00fchren k\u00f6nnen"
    "ag44": "Polarkoordinaten kennen und einsetzen k\u00f6nnen"
    "ag51": "Kegelschnitte in der Ebene durch Gleichungen\nbeschreiben k\u00f6nnen; aus einer Kreisgleichung Mittelpunkt und\nRadius bestimmen k\u00f6nnen"
    "ag52": "Die gegenseitige Lage von Kegelschnitt und Gerade\nermitteln k\u00f6nnen"
    "ag53": "Kugeln durch Gleichungen beschreiben k\u00f6nnen"

an_beschreibung:
    "an11": "Absolute und relative (prozentuelle) \u00e4nderungsma\u00dfe\nunterscheiden und angemessen verwenden k\u00f6nnen"
    "an12": "Den Zusammenhang Differenzenquotient (mittlere \u00e4nderungsrate \u2013\nDifferentialquotient (\u201emomentane\u201c \u00e4nderungsrate) auf der Grundlage\neines intuitiven Grenzwertbegriffes kennen und damit (verbal und\nauch in formaler Schreibweise) auch kontextbezogen anwenden\nk\u00f6nnen"
    "an13": "Den Differenzen- und Differentialquotienten in verschiedenen\nKontexten deuten und entsprechende Sachverhalte durch den\nDifferenzen- bzw. Differentialquotienten beschreiben k\u00f6nnen"
    "an14": "Das systemdynamische Verhalten von Gr\u00f6\u00dfen durch Differenzen-\ngleichungen beschreiben bzw. diese im Kontext deuten k\u00f6nnen"
    "an15": "Einfache Differentialgleichungen, insbesondere f'(x)= k\u00B7f(x),\nl\u00f6sen k\u00f6nnen"
    "an21": "Einfache Regeln des Differenzierens kennen und anwenden k\u00f6nnen:\nPotenzregel, Summenregel, Regeln f\u00fcr k\u00B7f(x)' und f(k\u00B7x)'"
    "an22": "Kettenregel kennen und anwenden k\u00f6nnen"
    "an31": "Den Begriff Ableitungsfunktion/Stammfunktion kennen und\nzur Beschreibung von Funktionen einsetzen k\u00f6nnen"
    "an32": "Den Zusammenhang zwischen Funktion und Ableitungsfunktion\n(bzw. Funktion und Stammfunktion) in deren grafischer Darstellung\nerkennen und beschreiben k\u00f6nnen"
    "an33": "Eigenschaften von Funktionen mithilfe der Ableitung(sfunktion)\nbeschreiben k\u00f6nnen: Monotonie, lokale Extrema, Links- und\nRechtskr\u00fcmmung, Wendestellen"
    "an34": "Zielfunktionen in einer Variablen f\u00fcr Optimierungsaufgaben\n(Extremwertaufgaben) aufstellen und globale Extremstellen ermitteln\nk\u00f6nnen"
    "an41": "Den Begriff des bestimmten Integrals als Grenzwert einer Summe\nvon Produkten deuten und beschreiben k\u00f6nnen"
    "an42": "Einfache Regeln des Integrierens kennen und anwenden k\u00f6nnen:\nPotenzregel, Summenregel, \u222bk\u00B7f(x)dx, \u222bf(k\u00B7x)dx; bestimmte Integrale\nvon Polynomfunktionen ermitteln k\u00f6nnen"
    "an43": "Das bestimmte Integral in verschiedenen Kontexten deuten und\nentsprechende Sachverhalte durch Integrale beschreiben k\u00f6nnen"


fa_beschreibung: 
    "fa11": "F\u00fcr gegebene Zusammenh\u00e4nge entscheiden k\u00f6nnen,\nob man sie als Funktionen betrachten kann"
    "fa12": "Formeln als Darstellung von Funktionen interpretieren\nund den Funktionstyp zuordnen k\u00f6nnen"
    "fa13": "Zwischen tabellarischen und grafischen Darstellungen\nfunktionaler Zusammenh\u00e4nge wechseln k\u00f6nnen"
    "fa14": "Aus Tabellen, Graphen und Gleichungen von Funktionen\nWerte(paare) ermitteln und im Kontext deuten k\u00f6nnen"
    "fa15": "Eigenschaften von Funktionen erkennen, benennen, im Kontext deuten\nund zum Erstellen von Funktionsgraphen einsetzen k\u00f6nnen:\nMonotonie, Monotoniewechsel (lokale Extrema), Wendepunkte,\nPeriodizit\u00e4t, Achsensymmetrie, asymptotisches Verhalten, Schnittpunkte\nmit den Achsen"
    "fa16": "Schnittpunkte zweier Funktionsgraphen grafisch und\nrechnerisch ermitteln und im Kontext interpretieren k\u00f6nnen"
    "fa17": "Funktionen als mathematische Modelle verstehen und\ndamit verst\u00e4ndig arbeiten k\u00f6nnen"
    "fa18": "Durch Gleichungen (Formeln) gegebene Funktionen mit\nmehreren Ver\u00e4nderlichen im Kontext deuten k\u00f6nnen,\nFunktionswerte ermitteln k\u00f6nnen"
    "fa19": "Einen \u00fcberblick \u00fcber die wichtigsten (unten angef\u00fchrten)\nTypen mathematischer Funktionen geben, ihre Eigenschaften\nvergleichen k\u00f6nnen"
    "fa21": "Verbal, tabellarisch, grafisch oder durch eine Gleichung\n(Formel) gegebene lineare Zusammenh\u00e4nge als lineare Funktionen\nerkennen bzw. betrachten k\u00f6nnen; zwischen diesen Darstellungsformen\nwechseln k\u00f6nnen"
    "fa22": "Aus Tabellen, Graphen und Gleichungen linearer Funktionen\nWerte(paare) sowie die Parameter k und d ermitteln und im Kontext\ndeuten k\u00f6nnen"
    "fa23": "Die Wirkung der Parameter k und d kennen und die Parameter\nin unterschiedlichen Kontexten deuten k\u00f6nnen"
    "fa24": "Charakteristische Eigenschaften von lineare Funktionen\nkennen und im Kontext deuten k\u00f6nnen"
    "fa25": "Die Angemessenheit einer Beschreibung mittels linearer\nFunktion bewerten k\u00f6nnen"
    "fa26": "Direkte Proportionalit\u00e4t als lineare Funktion vom Typ\nf(x) = k\u00B7x beschreiben k\u00f6nnen"
    "fa31": "Verbal, tabellarisch, grafisch oder durch eine Gleichung (Formel)\ngegebene Zusammenh\u00e4nge dieser Art als entsprechende\nPotenzfunktionen erkennen bzw. betrachten k\u00f6nnen;\nzwischen diesen Darstellungsformen wechseln k\u00f6nnen"
    "fa32": "Aus Tabellen, Graphen und Gleichungen von Potenzfunktionen\nWerte(paare) sowie die Parameter a und b ermitteln und im Kontext\ndeuten k\u00f6nnen"
    "fa33": "Die Wirkung der Parameter a und b bei Potenzfunktionen kennen\nund die Parameter im Kontext deuten k\u00f6nnen"
    "fa34": "Indirekte Proportionalit\u00e4t als Potenzfunktion vom Typ\nf(x)=a/x beschreiben k\u00f6nnen"
    "fa41": "Typische Verl\u00e4ufe von Graphen in Abh\u00e4ngigkeit vom Grad\nder Polynomfunktion (er)kennen"
    "fa42": "Zwischen tabellarischen und grafischen Darstellungen von\nZusammenh\u00e4ngen dieser Art wechseln k\u00f6nnen"
    "fa43": "Aus Tabellen, Graphen und Gleichungen von Polynomfunktionen\nFunktionswerte, aus Tabellen und Graphen sowie aus einer\nquadratischen Funktionsgleichung Argumentwerte ermitteln k\u00f6nnen"
    "fa44": "Den Zusammenhang zwischen dem Grad der Polynomfunktion und\nder Anzahl der Null-, Extrem- und Wendestellen wissen"
    "fa51": "Verbal, tabellarisch, grafisch oder durch eine Gleichung (Formel)\ngegebene exponentielle Zusammenh\u00e4nge als Exponentialfunktion\nerkennen bzw. betrachten k\u00f6nnen; zwischen diesen Darstellungs-\nformen wechseln k\u00f6nnen"
    "fa52": "Aus Tabellen, Graphen und Gleichungen von Exponentialfunktionen\nWerte(paare) ermitteln und im Kontext deuten k\u00f6nnen"
    "fa53": "Die Wirkung der Parameter a und b (bzw. e^\u03bb) kennen und die\nParameter in unterschiedlichen Kontexten deuten k\u00f6nnen"
    "fa54": "Charakteristische Eigenschaften von Exponentialfunktionen kennen\nund im Kontext deuten k\u00f6nnen"
    "fa55": "Die Begriffe \u201eHalbwertszeit\u201c und \u201eVerdoppelungszeit\u201c kennen, die\nentsprechenden Werte berechnen und im Kontext deuten k\u00f6nnen"
    "fa56": "Die Angemessenheit einer Beschreibung mittels Exponentialfunktion\nbewerten k\u00f6nnen"
    "fa61": "Grafisch oder durch eine Gleichung (Formel) gegebene Zusammen-\nh\u00e4nge der Art f(x) = a\u00B7sin(b\u00B7x) als Allgemeine Sinusfunktion erkennen\nbzw.betrachten k\u00f6nnen; zwischen diesen Darstellungsformen\nwechseln k\u00f6nnen"
    "fa62": "Aus Graphen und Gleichungen von Allgemeinen Sinusfunktionen\nWerte(paare) ermitteln und im Kontext deuten k\u00f6nnen"
    "fa63": "Die Wirkung der Parameter a und b bei Winkelfunktionen kennen\nund die Parameter im Kontext deuten k\u00f6nnen"
    "fa64": "Periodizit\u00e4t als charakteristische Eigenschaft kennen und im\nKontext deuten k\u00f6nnen"
    "fa65": "Wissen, dass cos(x)=sin(x+\u03c0/2)"
    "fa66": "Wissen, dass gilt: sin(x)'=cos(x) und cos(x)'=-sin(x)"
    "fa71": "Zahlenfolgen (insbesondere arithmetische und geometrische\nFolgen) durch explizite und rekursive Bildungsgesetze beschreiben\nund graphisch darstellen k\u00f6nnen"
    "fa72": "Zahlenfolgen als Funktionen \u00fcber N bzw. N* auffassen k\u00f6nnen,\ninsbesondere arithmetische Folgen als lineare Funktionen und\ngeometrische Folgen als Exponentialfunktionen"
    "fa73": "Definitionen monotoner und beschr\u00e4nkter\nFolgen kennen und anwenden k\u00f6nnen"
    "fa74": "Grenzwerte von einfachen Folgen ermitteln k\u00f6nnen"
    "fa81": "Endliche arithmetische und geometrische Reihen\nkennen und ihre Summen berechnen k\u00f6nnen"
    "fa82": "Den Begriff der Summe einer unendlichen\nReihe definieren k\u00f6nnen"
    "fa83": "Summen konvergenter geometrischer Reihen berechnen k\u00f6nnen"
    "fa84": "Folgen und Reihen zur Beschreibung diskreter Prozesse\nin anwendungsorientierten Bereichen einsetzen k\u00f6nnen"

ws_beschreibung:
    "ws11": "Werte aus tabellarischen und elementaren grafischen Darstellungen ablesen\n(bzw. zusammengesetzte Werte ermitteln) und im jeweiligen Kontext\nangemessen interpretieren k\u00f6nnen"
    "ws12": "Tabellen und einfache statistische Grafiken erstellen,\nzwischen Darstellungsformen wechseln k\u00f6nnen"
    "ws13": "Statistische Kennzahlen (absolute und relative H\u00e4ufigkeiten;\narithmetisches Mittel, Median, Modus; Quartile; Spannweite, empirische\nVarianz/Standardabweichung) im jeweiligen Kontext interpretieren k\u00f6nnen;\ndie angef\u00fchrten Kennzahlen f\u00fcr einfache Datens\u00e4tze ermitteln k\u00f6nnen"
    "ws14": "Definition und wichtige Eigenschaften des arithmetischen Mittels\nund des Medians angeben und nutzen, Quartile ermitteln und\ninterpretieren k\u00f6nnen, die Entscheidung f\u00fcr die Verwendung einer\nbestimmten Kennzahl begr\u00fcnden k\u00f6nnen"
    "ws21": "Grundraum und Ereignisse in angemessenen\nSituationen verbal bzw. formal angeben k\u00f6nnen"
    "ws22": "Relative H\u00e4ufigkeit als Sch\u00e4tzwert von Wahrscheinlichkeit\nverwenden und anwenden k\u00f6nnen"
    "ws23": "Wahrscheinlichkeit unter der Verwendung der Laplace-Annahme\n(Laplace Wahrscheinlichkeit) berechnen und interpretieren k\u00f6nnen,\n Additionsregel und Multiplikationsregel anwenden und\ninterpretieren k\u00f6nnen"
    "ws24": "Binomialkoeffizient berechnen und interpretieren k\u00f6nnen"
    "ws25": "Bedingte Wahrscheinlichkeiten kennen, berechnen und interpretieren k\u00f6nnen"
    "ws26": "Entscheiden k\u00f6nnen, ob ein Ereignis von einem anderen\nEreignis abh\u00e4ngt oder von diesem unabh\u00e4ngig ist"
    "ws31": "Die Begriffe Zufallsvariable, (Wahrscheinlichkeits-)Verteilung, Erwartungswert\nund Standardabweichung verst\u00e4ndig deuten und einsetzen k\u00f6nnen"
    "ws32": "Binomialverteilung als Modell einer diskreten Verteilung kennen \u2013\nErwartungswert und Varianz/Standardabweichung binomialverteilter Zufallsgr\u00f6\u00dfen\nermitteln k\u00f6nnen, Wahrsch.vert. binomialverteilter Zufallsgr\u00f6\u00dfen angeben k\u00f6nnen,\nArbeiten mit der Binomialverteilung in anwendungsorientierten Bereichen"
    "ws33": "Situationen erkennen und beschreiben k\u00f6nnen, in denen\nmit Binomialverteilung modelliert werden kann"
    "ws34": "Die Normalverteilung kennen und anwenden; Wahrscheinlichkeiten als Fl\u00e4cheninhalte\nunter dem Graphen der Dichtefunktion deuten und anwenden; die Bedeutung des\nErwartungswerts und der Standardabweichung f\u00fcr den Graphen der Dichtefunktion\nkennen und anwenden"
    "ws35": "Wahrscheinlichkeiten, Quantile und um den Erwartungswert symmetrische Intervalle\neiner normalverteilten Zufallsvariablen interpretieren und mit Technologieeinsatz\nermitteln; die \u03c3-Regeln (\u03c3, 2\u03c3, 3\u03c3; siehe Formelsammlung) f\u00fcr normalverteilte\nZufallsvariablen kennen und anwenden"
    "ws41": "Konfidenzintervalle als Sch\u00e4tzung f\u00fcr eine Wahrscheinlichkeit oder einen\nunbekannten Anteil p interpretieren (frequentistische Deutung) und verwenden\nk\u00f6nnen, Berechnungen auf Basis der Binomialverteilung oder einer durch die\nNormalverteilung approximierten Binomialverteilung durchf\u00fchren k\u00f6nnen"
    "ws42": "Einfache Anteilstests durchf\u00fchren k\u00f6nnen\nund ihr Ergebnis erl\u00e4utern k\u00f6nnen"

